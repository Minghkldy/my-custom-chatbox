<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatrace Style Inbox - Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="noti-sound" src="https://assets.mixkit.co/active_storage/sfx/2357/2357-84.wav" preload="auto"></audio>

    <div id="notification-box" class="noti-toast">
        <span style="font-size: 20px;">💬</span>
        <div>
            <b id="noti-sender" style="color: white; display: block; font-size: 14px;">စာအသစ် ဝင်လာပါသည်</b>
            <span id="noti-text" style="color: #9ca3af; font-size: 12px;">မက်ဆေ့ခ်ျပြရန်</span>
        </div>
    </div>

    <div class="app-layout">

        <div class="main-sidebar">
            <div class="menu-icon active" id="ico-inbox" onclick="showTab('inbox-tab', 'ico-inbox')" title="Inbox">📥</div>
            <div class="menu-icon" id="ico-bc" onclick="showTab('bc-tab', 'ico-bc')" title="Broadcast">📢</div>
            <div class="menu-icon" id="ico-settings" onclick="showTab('settings-tab', 'ico-settings')" title="Channels Connection Settings">⚙️</div>
        </div>

        <div class="app-container">
            
            <div id="inbox-tab" class="page active">
                
                <div class="user-sidebar">
                    <div class="sidebar-header">
                        <span>Inbox Conversations</span>
                        <button onclick="triggerDemoNotification()" style="font-size: 11px; background: #1f2937; border: 1px solid #374151; color: #9ca3af; padding: 4px 8px; border-radius: 4px; cursor: pointer;">Noti Test 🔔</button>
                    </div>
                    <div class="user-list" id="users-container">
                        <p style="text-align: center; color: #6b7280; margin-top: 20px; font-size: 13px;">No conversations yet...</p>
                    </div>
                </div>

                <div class="chat-area">
                    <div class="chat-header">
                        <span id="active-chat-title">💬 Please select a conversation</span>
                    </div>
                    <div class="chat-messages" id="chat-stream">
                        <p style="text-align: center; color: #6b7280; margin-top: 40px;">မက်ဆေ့ခ်ျများကို ဖတ်ရှုရန် လူတစ်ဦးအား ရွေးချယ်ပေးပါ</p>
                    </div>
                    <div class="chat-input-container">
                        <label for="chat-image-file" style="cursor: pointer; font-size: 20px; color: #9ca3af; user-select: none; transition: 0.2s;" title="Upload Photo">📎</label>
                        <input type="file" id="chat-image-file" accept="image/*" style="display: none;" onchange="uploadAndSendChatImage(this)">
                        
                        <input type="text" id="chat-field" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') pushMessage()">
                        <button onclick="pushMessage()">Send</button>
                    </div>
                </div>

                <div class="details-sidebar">
                    <div class="details-avatar" id="det-av">?</div>
                    <div class="details-name-box">
                        <div class="details-name" id="det-name">-</div>
                        <button class="btn-edit-name" onclick="editCurrentUserName()" title="Edit Name">✏️ ပြင်ရန်</button>
                    </div>
                    
                    <div class="info-card">
                        <div class="info-row"><span class="info-label">Contact ID</span><span id="det-id">-</span></div>
                        <div class="info-row"><span class="info-label">Platform</span><span id="det-plat">-</span></div>
                        <div class="info-row"><span class="info-label">Gender</span><span id="det-gen">-</span></div>
                    </div>

                    <div style="width: 100%; text-align: left;">
                        <div style="font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #9ca3af;">Tags</div>
                        <div style="display: inline-block; background-color: #374151; color: #3b82f6; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold;">Customer</div>
                    </div>
                </div>

            </div> <div id="bc-tab" class="page">
                <div id="broadcast-placeholder" style="width: 100%; height: 100%;"></div>
            </div>

            <div id="settings-tab" class="page">
                <div id="settings-placeholder" style="width: 100%; height: 100%;"></div>
            </div>

        </div> </div> <div id="zoom-img-modal" class="image-zoom-modal" style="display: none;">
        <span class="zoom-close-btn" onclick="closeImageZoomModal()">&times;</span>
        <img class="zoom-modal-content" id="zoom-target-src">
    </div>

    <script>
        // 🔗 မိတ်ဆွေ၏ Live ဖြစ်သွားသော Render URL အစစ်အမှန်
        const BACKEND_URL = "https://my-custom-chatbox.onrender.com"; 

        let currentActiveUserId = null; 
        let localCustomNames = JSON.parse(localStorage.getItem('CUSTOM_NAMES')) || {};
        let totalMessagesCount = 0;
        let previousTotalUnread = 0; // ယခင်စုစုပေါင်း မဖတ်ရသေးသော စာအရေအတွက်မှတ်ရန်

        // တက်ဘ်များ ကူးပြောင်းရန်
        function showTab(tabId, iconId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-icon').forEach(i => i.classList.remove('active'));
            
            const targetTab = document.getElementById(tabId);
            if(targetTab) targetTab.classList.add('active');
            
            const targetIcon = document.getElementById(iconId);
            if(targetIcon) targetIcon.classList.add('active');
        }

        // 🆕 API Keys များကို တစ်ခုချင်းစီ ခွဲပြီး သိမ်းဆည်းပေးမည့် လုပ်ဆောင်ချက်အသစ်
        async function saveSingleSetting(type) {
            let tgToken = document.getElementById('storage-tg-token') ? document.getElementById('storage-tg-token').value.trim() : '';
            let fbToken = document.getElementById('storage-fb-token') ? document.getElementById('storage-fb-token').value.trim() : '';
            let fbVerify = document.getElementById('storage-fb-verify') ? document.getElementById('storage-fb-verify').value.trim() : '';

            if (type === 'tg') {
                localStorage.setItem('TG_TOKEN', tgToken);
            } else if (type === 'fb') {
                localStorage.setItem('FB_TOKEN', fbToken);
                localStorage.setItem('FB_VERIFY', fbVerify);
            }

            try {
                const response = await fetch(`${BACKEND_URL}/api/save-config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tgToken, fbToken, fbVerify })
                });
                if(response.ok) {
                    if (type === 'tg') {
                        alert("✅ Telegram Bot Token ကို အောင်မြင်စွာ ချိတ်ဆက်သိမ်းဆည်းပြီးပါပြီဗျာ!");
                    } else {
                        alert("✅ Facebook Messenger Settings များကို အောင်မြင်စွာ ချိတ်ဆက်သိမ်းဆည်းပြီးပါပြီဗျာ!");
                    }
                }
            } catch (err) {
                console.error(err);
                alert("Server သို့ ချိတ်ဆက်ရန် အခက်အခဲရှိနေသော်လည်း Browser တွင် မှတ်သားထားပြီးဖြစ်သည်။");
            }
        }

        // 💾 Settings များအား local နှင့် Live Server ဆီ တိုက်ရိုက်ပို့သိမ်းခြင်း (အဟောင်း)
        async function saveSettingsToLocal() {
            let tgToken = document.getElementById('storage-tg-token') ? document.getElementById('storage-tg-token').value.trim() : '';
            let fbToken = document.getElementById('storage-fb-token') ? document.getElementById('storage-fb-token').value.trim() : '';
            let fbVerify = document.getElementById('storage-fb-verify') ? document.getElementById('storage-fb-verify').value.trim() : '';

            localStorage.setItem('TG_TOKEN', tgToken);
            localStorage.setItem('FB_TOKEN', fbToken);
            localStorage.setItem('FB_VERIFY', fbVerify);

            try {
                const response = await fetch(`${BACKEND_URL}/api/save-config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tgToken, fbToken, fbVerify })
                });
                if(response.ok) {
                    alert("✅ Token များကို ဒိုင်ခွက်ပေါ်တွင်ရော Live Server ပေါ်တွင်ပါ တစ်ပြိုင်နက် ချိတ်ဆက်ပြီးပါပြီဗျာ!");
                }
            } catch (err) {
                console.error(err);
                alert("Server သို့ ချိတ်ဆက်ရန် အခက်အခဲရှိနေသော်လည်း Browser တွင် မှတ်သားထားပြီးဖြစ်သည်။");
            }
        }

        // Сာမျက်နှာပွင့်လာလျှင် ယခင်သိမ်းထားဖူးသော Token များ ပြန်ဖော်ပေးရန်နှင့် သီးသန့်ဖိုင်များကို ဆွဲခေါ်ရန်
        window.onload = function() {
            // 🔄 Broadcast HTML ဖိုင်အား Dynamic Fetch လုပ်ပြီး လှမ်းထည့်ခြင်း
            fetch('broadcast.html')
                .then(response => response.text())
                .then(htmlData => {
                    document.getElementById('broadcast-placeholder').innerHTML = htmlData;
                })
                .catch(err => console.error("Broadcast ဖိုင်ဆွဲယူရာတွင် အမှားရှိသည် - ", err));

            // 🔄 Settings HTML ဖိုင်အား Dynamic Fetch လုပ်ပြီး လှမ်းထည့်ခြင်း
            fetch('settings.html')
                .then(response => response.text())
                .then(htmlData => {
                    document.getElementById('settings-placeholder').innerHTML = htmlData;
                    // ဖိုင်ဆွဲပြီးမှ input values များကို ပြန်ထည့်ပေးခြင်း
                    setTimeout(() => {
                        if(localStorage.getItem('TG_TOKEN') && document.getElementById('storage-tg-token')) document.getElementById('storage-tg-token').value = localStorage.getItem('TG_TOKEN');
                        if(localStorage.getItem('FB_TOKEN') && document.getElementById('storage-fb-token')) document.getElementById('storage-fb-token').value = localStorage.getItem('FB_TOKEN');
                        if(localStorage.getItem('FB_VERIFY') && document.getElementById('storage-fb-verify')) document.getElementById('storage-fb-verify').value = localStorage.getItem('FB_VERIFY');
                    }, 200);
                })
                .catch(err => console.error("Settings ဖိုင်ဆွဲယူရာတွင် အမှားရှိသည် - ", err));

            // Server က ဒေတာတွေကို ချက်ချင်း စတင်ဆွဲယူခိုင်းခြင်း
            fetchLiveUpdates();

            // 🆕 Chatbox ထဲက ပုံတွေကို ထောက်ပြီး နှိပ်လိုက်ရင် ပုံကြီးပွင့်လာစေမည့် Event Listener စနစ်
            document.getElementById('chat-stream').addEventListener('click', function(e) {
                if (e.target && e.target.tagName === 'IMG') {
                    openImageZoomModal(e.target.src);
                }
            });

            // 🆕 ပုံကြီးပွင့်နေချိန် နောက်ခံအမည်းရောင်နေရာကို နှိပ်လိုက်လျှင် ပြန်ပိတ်ပေးမည့် စနစ်
            document.getElementById('zoom-img-modal').addEventListener('click', function(e) {
                if (e.target.id === 'zoom-img-modal') {
                    closeImageZoomModal();
                }
            });
        }

        // 🆕 Image Zoom Modal ဖွင့်ရန် Function
        function openImageZoomModal(imgSrc) {
            const modal = document.getElementById('zoom-img-modal');
            const modalImg = document.getElementById('zoom-target-src');
            modal.style.display = "block";
            modalImg.src = imgSrc;
        }

        // 🆕 Image Zoom Modal ပိတ်ရန် Function
        function closeImageZoomModal() {
            document.getElementById('zoom-img-modal').style.display = "none";
        }

        // 🔄 ၃ စက္ကန့်တစ်ကြိမ် Server ထံမှ စာဝင်/စာထွက်များကို ပုံမှန်ဆွဲယူမည့် နှလုံးခုန်စနစ် (Polling)
        async function fetchLiveUpdates() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/messages`);
                const data = await response.json();
                
                // Сonversations စာရင်းကို အမြဲဆွဲယူရန်
                let currentTotalUnread = data.users.reduce((sum, u) => sum + (u.unread || 0), 0);
                
                if (currentTotalUnread > previousTotalUnread) {
                    document.getElementById('noti-sound').play().catch(e => console.log("Audio playback raw block handled"));
                }
                previousTotalUnread = currentTotalUnread;

                renderUserList(data.users);
                renderChatStream(data.logs);
                checkNewIncomingNotification(data.logs);
            } catch (e) {
                console.log("Waiting for data stream connecting...");
            }
            setTimeout(fetchLiveUpdates, 3000);
        }

        // ဘယ်ဘက်ခြမ်း User List ကို Server ကလာသည့် ဒေတာအတိုင်း ဆွဲထုတ်ပေးခြင်း
        function renderUserList(users) {
            const container = document.getElementById('users-container');
            if(!container) return;
            if(users.length === 0) {
                container.innerHTML = `<p style="text-align: center; color: #6b7280; margin-top: 20px; font-size: 13px;">No conversations yet...</p>`;
                return;
            }

            let html = '';
            users.forEach(user => {
                let displayName = localCustomNames[user.id] || user.name;
                let activeClass = user.id == currentActiveUserId ? 'active' : '';
                let badgeClass = user.platform === 'Telegram' ? 'badge-tg' : 'badge-msg';
                let platformLabel = user.platform === 'Telegram' ? 'TG' : 'FB';
                let initial = displayName.charAt(0);

                let unreadBadgeHtml = (user.unread && user.unread > 0)
                    ? `<span style="background-color: #ef4444; color: white; border-radius: 50%; padding: 2px 7px; font-size: 11px; font-weight: bold; margin-left: 8px;">${user.unread}</span>`
                    : '';

                html += `
                    <div class="user-item ${activeClass}" id="user-node-${user.id}" onclick="selectUser('${user.name.replace(/'/g, "\\'")}', '${user.platform}', '${user.id}', '${user.gender}')">
                        <div class="avatar">${initial}<div class="platform-badge ${badgeClass}">${platformLabel}</div></div>
                        <div class="user-info">
                            <div class="user-name">
                                <span>${displayName} ${unreadBadgeHtml}</span> 
                                <span class="msg-time">${user.time || ''}</span>
                            </div>
                            <div class="last-msg">${user.lastMsg || ''}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // လူတစ်ယောက်ကို ရွေးချယ်လိုက်လျှင် Profile Detail ကို ပြောင်းပေးခြင်း
        async function selectUser(name, platform, id, gender) {
            currentActiveUserId = id;
            let displayName = localCustomNames[id] || name;

            document.getElementById('active-chat-title').innerText = `💬 Chatting with ${displayName}`;
            document.getElementById('det-av').innerText = displayName.charAt(0);
            document.getElementById('det-name').innerText = displayName;
            document.getElementById('det-id').innerText = id;
            document.getElementById('det-plat').innerText = platform;
            document.getElementById('det-gen').innerText = gender;

            document.querySelectorAll('.user-item').forEach(item => item.classList.remove('active'));
            const currentNode = document.getElementById(`user-node-${id}`);
            if(currentNode) currentNode.classList.add('active');

            try {
                await fetch(`${BACKEND_URL}/api/mark-read`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: id })
                });
            } catch (err) {
                console.log("Read status update skipped");
            }

            fetch(`${BACKEND_URL}/api/messages`)
                .then(res => res.json())
                .then(data => {
                    renderUserList(data.users);
                    renderChatStream(data.logs);
                });
        }

        // စကားပြောခန်းအလယ်၌ မက်ဆေ့ခ်ျများ အစီအစဉ်တကျ ပြသခြင်း
        function renderChatStream(logs) {
            if(!currentActiveUserId) return;
            
            const stream = document.getElementById('chat-stream');
            if(!stream) return;
            let activeLogs = logs.filter(log => log.userId == currentActiveUserId);
            
            if(activeLogs.length === 0) {
                stream.innerHTML = `<p style="text-align: center; color: #6b7280; margin-top: 40px;">မက်ဆေ့ခ်ျမရှိသေးပါ စာစတင်ရိုက်ပို့နိုင်ပါသည်</p>`;
                return;
            }

            let html = '';
            activeLogs.forEach(log => {
                let sideClass = log.sender === 'user' ? 'incoming' : 'outgoing';
                
                // လင့်ခ်သည် ပုံလင့်ခ်ဖြစ်နေပါက <img> tag ဖြင့် ပုံအဖြစ် တိုက်ရိုက်ပြသရန် စစ်ဆေးခြင်း
                const isImage = log.text.startsWith('http') && (log.text.match(/\.(jpeg|jpg|gif|png)$/) || log.text.includes('file/bot') || log.text.includes('api.imgbb.com'));
                
                // 🆕 ပုံကြီးချဲ့စနစ်နှင့် ချိတ်ဆက်နိုင်ရန် window.open နေရာတွင် သတ်မှတ်ချက်ကို ဖယ်ထုတ်ပြီး IMG များကို တိုက်ရိုက် render လုပ်ထားပါသည်
                let renderContent = isImage 
                    ? `<img src="${log.text}" style="max-width: 230px; max-height: 230px; border-radius: 8px; display: block; margin: 4px 0 haste;"/>`
                    : log.text;

                html += `<div class="message-wrapper"><div class="message ${sideClass}">${renderContent}</div></div>`;
            });
            
            let isScrollAtBottom = stream.scrollHeight - stream.clientHeight <= stream.scrollTop + 100;
            stream.innerHTML = html;
            if(isScrollAtBottom || totalMessagesCount === 0) {
                stream.scrollTop = stream.scrollHeight;
            }
        }

        // 📷 ကွန်ပျူတာ/ဖုန်းထဲမှ ပုံရွေးပြီး တိုက်ရိုက် Upload လုပ်၍ ပို့မည့် စနစ်သစ်
        async function uploadAndSendChatImage(input) {
            if (!input.files || !input.files[0] || !currentActiveUserId) return;
            
            const file = input.files[0];
            const formData = new FormData();
            formData.append('image', file);

            let platform = document.getElementById('det-plat').innerText;
            let userId = document.getElementById('det-id').innerText;

            try {
                // အခမဲ့ ImgBB API သုံး၍ ပုံအား Direct Image Link ပြောင်းလဲခြင်း
                const res = await fetch('https://api.imgbb.com/1/upload?key=5ad4eff014b84be4fcefeb2430570765', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if(data.success) {
                    const uploadedUrl = data.data.url;
                    
                    // Server သို့ ပုံလင့်ခ် ပို့ဆောင်ခြင်း
                    await fetch(`${BACKEND_URL}/api/send-message`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: uploadedUrl, userId, platform })
                    });
                    
                    input.value = ""; // ဖိုင်ရွေးထားသည်ကို Reset လုပ်ခြင်း
                } else {
                    alert("ပုံတင်ခြင်း မအောင်မြင်ပါ။ ထပ်မံကြိုးစားကြည့်ပါ။");
                }
            } catch (err) {
                console.error("Image Upload Error:", err);
                alert("ပုံတင်ရာတွင် ချိတ်ဆက်မှု အမှားအယွင်းရှိနေပါသည်။");
            }
        }

        // Сာအသစ်ဝင်လာပါက Noti တက်စေပြီး အသံမြည်စေသည့်စနစ်
        function checkNewIncomingNotification(logs) {
            if(logs.length > totalMessagesCount) {
                let lastLog = logs[logs.length - 1];
                if(lastLog.sender === 'user') {
                    let senderName = localCustomNames[lastLog.userId] || `User ID: ${lastLog.userId}`;
                    
                    let notiBox = document.getElementById('notification-box');
                    document.getElementById('noti-sender').innerText = `🔔 စာအသစ်ဝင်လာသည် (${senderName})`;
                    
                    // Noti Box ထဲတွင် ပုံလင့်ခ်ဖြစ်ပါက 📷 Photo ဟုပြရန်
                    const isImg = lastLog.text.startsWith('http') && (lastLog.text.match(/\.(jpeg|jpg|gif|png)$/) || lastLog.text.includes('file/bot'));
                    document.getElementById('noti-text').innerText = isImg ? "📷 Send you a photo" : lastLog.text;
                    
                    notiBox.style.display = "flex";
                    setTimeout(() => notiBox.style.display = "none", 4000);
                }
                totalMessagesCount = logs.length;
            }
        }

        // 📝 စိတ်ကြိုက် နာမည်ပြောင်းပေးနိုင်မည့်စနစ် (Contact Name Customization)
        function editCurrentUserName() {
            if(!currentActiveUserId) return;
            let currentId = document.getElementById('det-id').innerText;
            let currentName = document.getElementById('det-name').innerText;
            
            let newName = prompt("ဤအသုံးပြုသူအတွက် သင်စိတ်ကြိုက်ပေးချင်သော နာမည်သစ်ကို ရိုက်ထည့်ပါ -", currentName);
            
            if (newName && newName.trim() !== "") {
                newName = newName.trim();
                localCustomNames[currentId] = newName;
                localStorage.setItem('CUSTOM_NAMES', JSON.stringify(localCustomNames));
                
                document.getElementById('det-name').innerText = newName;
                document.getElementById('det-av').innerText = newName.charAt(0);
                document.getElementById('active-chat-title').innerText = `💬 Chatting with ${newName}`;
            }
        }

        // စာရိုက်ပြီး Send နှိပ်လျှင် Telegram/Messenger သို့ တကယ်ထွက်သွားစေမည့်စနစ်
        async function pushMessage() {
            let input = document.getElementById('chat-field');
            let text = input.value.trim();
            if(text === "" || !currentActiveUserId) return;
            
            let platform = document.getElementById('det-plat').innerText;
            let userId = document.getElementById('det-id').innerText;

            let stream = document.getElementById('chat-stream');
            stream.innerHTML += `<div class="message-wrapper"><div class="message outgoing">${text}</div></div>`;
            input.value = "";
            stream.scrollTop = stream.scrollHeight;

            try {
                await fetch(`${BACKEND_URL}/api/send-message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, userId, platform })
                });
            } catch (e) {
                console.error("စာပို့ရန် အခက်အခဲရှိနေသည်:", e);
            }
        }

        // 📢 စာသားရော ဓာတ်ပုံလင့်ခ်ပါ ပူးတွဲပို့နိုင်မည့် Broadcast စနစ်သစ် လုပ်ဆောင်ချက်
        async function executeBroadcast() {
            const text = document.getElementById('bc-text') ? document.getElementById('bc-text').value.trim() : '';
            const imageUrl = document.getElementById('bc-image-url') ? document.getElementById('bc-image-url').value.trim() : '';

            if (!text && !imageUrl) {
                alert("❗️ ကျေးဇူးပြု၍ စာသား သို့မဟုတ် ပုံလင့်ခ် တစ်ခုခု ရိုက်ထည့်ပေးပါဗျာ।");
                return;
            }

            try {
                const response = await fetch(`${BACKEND_URL}/api/broadcast`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, imageUrl })
                });
                
                if (response.ok) {
                    alert("📢 Broadcast Message ကို လူတိုင်းဆီ အောင်မြင်စွာ ဖြန့်ဝေပြီးပါပြီဗျာ!");
                    if(document.getElementById('bc-text')) document.getElementById('bc-text').value = "";
                    if(document.getElementById('bc-image-url')) document.getElementById('bc-image-url').value = "";
                } else {
                    alert("Broadcast ပို့ဆောင်မှု မအောင်မြင်ပါ။ ဆာဗာအခြေအနေကို စစ်ဆေးပါ။");
                }
            } catch (err) {
                console.error(err);
                alert("ဆာဗာနှင့် ချိတ်ဆက်မှု အမှားအယွင်းရှိနေပါသည်။");
            }
        }

        // Demo Noti Test ခလုတ်နှိပ်လျှင် အလုပ်လုပ်ရန်
        function triggerDemoNotification() {
            document.getElementById('noti-sound').play();
            let notiBox = document.getElementById('notification-box');
            document.getElementById('noti-sender').innerText = "🔔 စနစ်စမ်းသပ်မှု အောင်မြင်သည်";
            document.getElementById('noti-text').innerText = "စနစ်မှ အသံနှင့် Notification ကောင်းမွန်စွာ အလုပ်လုပ်နေပါသည်ဗျာ!";
            notiBox.style.display = "flex";
            setTimeout(() => notiBox.style.display = "none", 4000);
        }
    </script>
</body>
</html>
